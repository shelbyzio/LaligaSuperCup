<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaLiga 12-Team Tournament Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #db002d; border-radius: 10px; }
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <header class="bg-[#db002d] border-b-4 border-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-3 py-3 flex flex-row justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <div class="bg-white p-1 rounded-lg h-9 w-9 overflow-hidden flex items-center justify-center">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSv2vWVRiHGnHQNoW-3K3HKpvqILLvH87HZIw&s" alt="LaLiga" class="h-full w-full object-contain">
                </div>
                <div>
                    <h1 class="text-sm font-black text-white">SPAIN <span class="text-white">LA LIGA</span></h1>
                    <p class="text-[8px] text-white/80 font-bold uppercase">THE ONE COMMUNITY</p>
                </div>
            </div>
            <div class="flex bg-white/20 p-0.5 rounded-lg border border-white/30">
                <button id="tab-fixtures-btn" onclick="switchTab('fixtures')" class="px-3 py-1.5 rounded-md text-[10px] font-bold text-[#db002d] bg-white shadow-lg">Fixtures</button>
                <button id="tab-standings-btn" onclick="switchTab('standings')" class="px-3 py-1.5 rounded-md text-[10px] font-bold text-white">Standings</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 py-5 flex-1 w-full">
        <div id="tab-fixtures-content" class="space-y-4">
            <div class="bg-white border border-red-100 rounded-xl p-3 shadow-sm">
                <span class="text-[10px] font-bold text-[#db002d] uppercase mb-2 block">Matchday Selector</span>
                <div class="flex gap-2 overflow-x-auto scrollbar-hidden pb-1" id="matchday-selector-container"></div>
            </div>
            <div class="flex justify-between items-center bg-white border-l-4 border-[#db002d] p-3 rounded-r-xl shadow-sm">
                <h2 class="text-sm font-black text-slate-800" id="fixture-round-title">ROUND 1</h2>
                <div class="flex gap-1">
                    <button onclick="changeMatchday(-1)" class="w-8 h-8 bg-[#db002d] rounded-lg text-white"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="changeMatchday(1)" class="w-8 h-8 bg-[#db002d] rounded-lg text-white"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3" id="fixtures-grid"></div>
        </div>

        <div id="tab-standings-content" class="hidden space-y-4">
            <div class="bg-white border border-red-100 rounded-xl overflow-x-auto text-[9px] shadow-sm">
                <table class="w-full text-center">
                    <thead class="bg-slate-100 uppercase">
                        <tr>
                            <th class="py-3 px-1">#</th>
                            <th class="py-3 text-left px-1">Club</th>
                            <th class="py-3 px-1">M</th>
                            <th class="py-3 px-1">W</th>
                            <th class="py-3 px-1">D</th>
                            <th class="py-3 px-1">L</th>
                            <th class="py-3 px-1">GF</th>
                            <th class="py-3 px-1">GA</th>
                            <th class="py-3 px-1">GD</th>
                            <th class="py-3 px-1">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="standings-table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const TEAMS_LIST = [
            { id: "BAR", name: "Barcelona", logo: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg", tg: "https://t.me/Enzo21198" },
            { id: "RMA", name: "Real Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", tg: "https://t.me/Hemaljr10" },
            { id: "ATM", name: "Atletico Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f9/Atletico_Madrid_Logo_2024.svg/250px-Atletico_Madrid_Logo_2024.svg.png", tg: "https://t.me/lakham212" },
            { id: "VIL", name: "Villarreal", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/b/b9/Villarreal_CF_logo-en.svg/1280px-Villarreal_CF_logo-en.svg.png", tg: "https://t.me/Naingslw" },
            { id: "RSO", name: "Real Sociedad", logo: "https://upload.wikimedia.org/wikipedia/en/f/f1/Real_Sociedad_logo.svg", tg: "https://t.me/" },
            { id: "BET", name: "Real Betis", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/1/13/Real_betis_logo.svg/1280px-Real_betis_logo.svg.png", tg: "https://t.me/chitkoko123123" },
            { id: "SEV", name: "Sevilla", logo: "https://upload.wikimedia.org/wikipedia/en/3/3b/Sevilla_FC_logo.svg", tg: "https://t.me/thantthiha123" },
            { id: "ATH", name: "Athletic Bilbao", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/9/98/Club_Athletic_Bilbao_logo.svg/1280px-Club_Athletic_Bilbao_logo.svg.png", tg: "https://t.me/Naingklinn" },
            { id: "GET", name: "Getafe", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/46/Getafe_logo.svg/1280px-Getafe_logo.svg.png", tg: "https://t.me/JeevaG2006" },
            { id: "GIR", name: "Girona", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f7/Girona_FC_Logo.svg/1280px-Girona_FC_Logo.svg.png", tg: "https://t.me/LHA_goodluck" },
            { id: "VAL", name: "Valencia", logo: "https://upload.wikimedia.org/wikipedia/en/c/ce/Valenciacf.svg", tg: "https://t.me/FeyLanze" },
            { id: "ALA", name: "Alaves", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f8/Deportivo_Alaves_logo_%282020%29.svg/1280px-Deportivo_Alaves_logo_%282020%29.svg.png", tg: "https://t.me/ToeAung16" }
        ];

        const RESULTS = {
            0: [{ home: "BAR", away: "ALA", hs: 2, as: 8 }, { home: "RMA", away: "VAL", hs: 3, as: 3 }, { home: "ATM", away: "GIR", hs: 13, as: 0 }, { home: "VIL", away: "GET", hs: 0 , as: 3 }, { home: "RSO", away: "ATH", hs: 0, as: 4 }, { home: "BET", away: "SEV", hs: 1, as: 6 }],
            1: [{ home: "RMA", away: "ALA", hs: 3, as: 4 }, { home: "ATM", away: "BAR", hs: 1, as: 3 }, { home: "VIL", away: "VAL", hs: 5 , as: 2  }, { home: "RSO", away: "GIR", hs: 3, as: 0 }, { home: "BET", away: "GET", hs: 1, as: 5 }, { home: "SEV", away: "ATH", hs: 2, as: 2 }],
            2: [{ home: "ATM", away: "ALA", hs: 7, as: 3 }, { home: "VIL", away: "RMA", hs: 2, as: 1 }, { home: "RSO", away: "BAR", hs: 3, as: 2 }, { home: "BET", away: "VAL", hs: null, as: null }, { home: "SEV", away: "GIR", hs: 3, as: 0 }, { home: "ATH", away: "GET", hs: 1, as: 2 }],
            3: [{ home: "VIL", away: "ALA", hs: null, as: null }, { home: "RSO", away: "ATM", hs: null, as: null }, { home: "BET", away: "RMA", hs: null, as: null }, { home: "SEV", away: "BAR", hs: null, as: null }, { home: "ATH", away: "VAL", hs: null, as: null }, { home: "GET", away: "GIR", hs: null, as: null }],
            4: [{ home: "RSO", away: "ALA", hs: null, as: null }, { home: "BET", away: "VIL", hs: null, as: null }, { home: "SEV", away: "ATM", hs: null, as: null }, { home: "ATH", away: "RMA", hs: null, as: null }, { home: "GET", away: "BAR", hs: null, as: null }, { home: "GIR", away: "VAL", hs: null, as: null }],
            5: [{ home: "BET", away: "ALA", hs: null, as: null }, { home: "SEV", away: "RSO", hs: null, as: null }, { home: "ATH", away: "VIL", hs: null, as: null }, { home: "GET", away: "ATM", hs: null, as: null }, { home: "GIR", away: "RMA", hs: null, as: null }, { home: "VAL", away: "BAR", hs: null, as: null }],
            6: [{ home: "SEV", away: "ALA", hs: null, as: null }, { home: "ATH", away: "BET", hs: null, as: null }, { home: "GET", away: "RSO", hs: null, as: null }, { home: "GIR", away: "VIL", hs: null, as: null }, { home: "VAL", away: "ATM", hs: null, as: null }, { home: "BAR", away: "RMA", hs: null, as: null }],
            7: [{ home: "ATH", away: "ALA", hs: null, as: null }, { home: "GET", away: "SEV", hs: null, as: null }, { home: "GIR", away: "BET", hs: null, as: null }, { home: "VAL", away: "RSO", hs: null, as: null }, { home: "BAR", away: "VIL", hs: null, as: null }, { home: "RMA", away: "ATM", hs: null, as: null }],
            8: [{ home: "GET", away: "ALA", hs: null, as: null }, { home: "GIR", away: "ATH", hs: null, as: null }, { home: "VAL", away: "SEV", hs: null, as: null }, { home: "BAR", away: "BET", hs: null, as: null }, { home: "RMA", away: "RSO", hs: null, as: null }, { home: "ATM", away: "VIL", hs: null, as: null }],
            9: [{ home: "GIR", away: "ALA", hs: null, as: null }, { home: "VAL", away: "GET", hs: null, as: null }, { home: "BAR", away: "ATH", hs: null, as: null }, { home: "RMA", away: "SEV", hs: null, as: null }, { home: "ATM", away: "BET", hs: null, as: null }, { home: "VIL", away: "RSO", hs: null, as: null }],
            10: [{ home: "VAL", away: "ALA", hs: null, as: null }, { home: "BAR", away: "GIR", hs: null, as: null }, { home: "RMA", away: "GET", hs: null, as: null }, { home: "ATM", away: "ATH", hs: null, as: null }, { home: "VIL", away: "SEV", hs: null, as: null }, { home: "RSO", away: "BET", hs: null, as: null }]
        };

        let fixtures = [], stats = {}, currentViewingMatchday = 0, TOTAL_ROUNDS = 11;
        
        window.onload = () => { generateFixtures(); processResults(); renderMatchdaySelector(); renderFixtures(); };

        function generateFixtures() {
            const numTeams = TEAMS_LIST.length;
            for (let round = 0; round < numTeams - 1; round++) {
                const roundMatches = [];
                for (let i = 0; i < numTeams / 2; i++) {
                    const home = (round + i) % (numTeams - 1), away = (i === 0) ? numTeams - 1 : (numTeams - 1 - i + round) % (numTeams - 1);
                    roundMatches.push({ home: TEAMS_LIST[home].id, away: TEAMS_LIST[away].id });
                }
                fixtures.push(roundMatches);
            }
        }

        function processResults() {
            stats = {};
            TEAMS_LIST.forEach(t => stats[t.id] = { m:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 });
            Object.values(RESULTS).flat().forEach(res => {
                if (res.hs === null || res.as === null) return;
                const h = stats[res.home], a = stats[res.away];
                h.m++; a.m++; h.gf += res.hs; h.ga += res.as; a.gf += res.as; a.ga += res.hs;
                if (res.hs > res.as) { h.w++; a.l++; h.pts += 3; }
                else if (res.hs < res.as) { a.w++; h.l++; a.pts += 3; }
                else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
                h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
            });
        }

        function renderMatchdaySelector() {
            const container = document.getElementById('matchday-selector-container');
            for (let r = 0; r < TOTAL_ROUNDS; r++) {
                const btn = document.createElement('button');
                btn.id = `matchday-btn-${r}`;
                btn.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${r === 0 ? 'bg-[#db002d] text-white' : 'bg-slate-100'}`;
                btn.innerText = `R${r + 1}`;
                btn.onclick = () => { currentViewingMatchday = r; renderFixtures(); updateSelectors(); };
                container.appendChild(btn);
            }
        }

        function updateSelectors() {
            document.querySelectorAll('[id^="matchday-btn-"]').forEach((btn, r) => {
                btn.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${r === currentViewingMatchday ? 'bg-[#db002d] text-white' : 'bg-slate-100'}`;
            });
        }

        function renderFixtures() {
            const container = document.getElementById('fixtures-grid');
            container.innerHTML = '';
            document.getElementById('fixture-round-title').innerText = `ROUND ${currentViewingMatchday + 1}`;
            (fixtures[currentViewingMatchday] || []).forEach(match => {
                const h = TEAMS_LIST.find(t => t.id === match.home), a = TEAMS_LIST.find(t => t.id === match.away);
                const res = (RESULTS[currentViewingMatchday] || []).find(r => r.home === h.id && r.away === a.id);
                const score = (res && res.hs !== null) ? `${res.hs} - ${res.as}` : "VS";
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 rounded-xl p-3 grid grid-cols-[1fr,auto,1fr] items-center gap-2 shadow-sm";
                card.innerHTML = `
                    <div class="flex items-center gap-2"><img src="${h.logo}" class="w-8 h-8 object-contain"><a href="${h.tg}" target="_blank" class="text-xs font-bold truncate hover:underline">${h.name}</a></div>
                    <div class="px-3 font-black text-slate-800">${score}</div>
                    <div class="flex items-center justify-end gap-2 text-right"><a href="${a.tg}" target="_blank" class="text-xs font-bold truncate hover:underline">${a.name}</a><img src="${a.logo}" class="w-8 h-8 object-contain"></div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tab) {
            document.getElementById('tab-fixtures-content').classList.toggle('hidden', tab !== 'fixtures');
            document.getElementById('tab-standings-content').classList.toggle('hidden', tab !== 'standings');
            if(tab === 'standings') updateStandings();
        }

        function updateStandings() {
            const tbody = document.getElementById('standings-table-body');
            const sorted = TEAMS_LIST.map(t => ({...t, ...stats[t.id]})).sort((a,b) => b.pts - a.pts || b.gd - a.gd);
            tbody.innerHTML = sorted.map((t, idx) => `
                <tr class="text-[10px]">
                    <td class="py-3 px-1 font-bold">${idx+1}</td>
                    <td class="py-3 text-left px-1 font-bold flex items-center gap-1">
                        <img src="${t.logo}" class="w-5 h-5 object-contain">
                        <a href="${t.tg}" target="_blank" class="hover:underline">${t.name}</a>
                    </td>
                    <td class="py-3 px-1">${t.m}</td>
                    <td class="py-3 px-1">${t.w}</td>
                    <td class="py-3 px-1">${t.d}</td>
                    <td class="py-3 px-1">${t.l}</td>
                    <td class="py-3 px-1">${t.gf}</td>
                    <td class="py-3 px-1">${t.ga}</td>
                    <td class="py-3 px-1">${t.gd}</td>
                    <td class="py-3 px-1 font-black text-[#db002d]">${t.pts}</td>
                </tr>`).join('');
        }
        
        function changeMatchday(d) {
            currentViewingMatchday = Math.max(0, Math.min(TOTAL_ROUNDS - 1, currentViewingMatchday + d));
            renderFixtures(); updateSelectors();
        }
    </script>
</body>
</html>
