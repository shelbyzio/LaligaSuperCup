<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaLiga 12-Team Tournament Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #db002d; border-radius: 10px; }
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <header class="bg-[#db002d] border-b-4 border-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-3 py-3 flex flex-row justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <div class="bg-white p-1 rounded-lg h-9 w-9 overflow-hidden flex items-center justify-center">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSv2vWVRiHGnHQNoW-3K3HKpvqILLvH87HZIw&s" alt="LaLiga" class="h-full w-full object-contain">
                </div>
                <div>
                    <h1 class="text-sm font-black text-white">SPAIN <span class="text-white">LA LIGA</span></h1>
                    <p class="text-[8px] text-white/80 font-bold uppercase">THE ONE COMMUNITY</p>
                </div>
            </div>
            <div class="flex bg-white/20 p-0.5 rounded-lg border border-white/30">
                <button id="tab-fixtures-btn" onclick="switchTab('fixtures')" class="px-3 py-1.5 rounded-md text-[10px] font-bold text-[#db002d] bg-white shadow-lg">Fixtures</button>
                <button id="tab-standings-btn" onclick="switchTab('standings')" class="px-3 py-1.5 rounded-md text-[10px] font-bold text-white">Standings</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 py-5 flex-1 w-full">
        <div class="grid grid-cols-2 gap-2 mb-5">
            <div class="bg-white border border-red-100 p-3 rounded-xl flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-shield-halved text-[#db002d] text-sm"></i>
                <div><span class="text-[8px] text-slate-500 block uppercase">Teams</span><span class="text-sm font-bold">12</span></div>
            </div>
            <div class="bg-white border border-red-100 p-3 rounded-xl flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-calendar-check text-[#db002d] text-sm"></i>
                <div><span class="text-[8px] text-slate-500 block uppercase">Matches</span><span class="text-sm font-bold">66</span></div>
            </div>
        </div>

        <div id="tab-fixtures-content" class="space-y-4">
            <div class="bg-white border border-red-100 rounded-xl p-3 shadow-sm">
                <span class="text-[10px] font-bold text-[#db002d] uppercase mb-2 block">Matchday Selector</span>
                <div class="flex gap-2 overflow-x-auto scrollbar-hidden pb-1" id="matchday-selector-container"></div>
            </div>

            <div class="flex justify-between items-center bg-white border-l-4 border-[#db002d] p-3 rounded-r-xl shadow-sm">
                <h2 class="text-sm font-black text-slate-800" id="fixture-round-title">ROUND 1</h2>
                <div class="flex gap-1">
                    <button onclick="changeMatchday(-1)" class="w-8 h-8 bg-[#db002d] rounded-lg text-white"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="changeMatchday(1)" class="w-8 h-8 bg-[#db002d] rounded-lg text-white"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3" id="fixtures-grid"></div>
        </div>

        <div id="tab-standings-content" class="hidden space-y-4">
            <div class="bg-white border border-red-100 rounded-xl overflow-x-auto text-[9px] shadow-sm">
                <table class="w-full text-center">
                    <thead class="bg-slate-100 uppercase">
                        <tr>
                            <th class="py-3 px-2">#</th>
                            <th class="py-3 text-left">Club</th>
                            <th class="py-3 px-2">M</th>
                            <th class="py-3 px-2">W</th>
                            <th class="py-3 px-2">D</th>
                            <th class="py-3 px-2">L</th>
                            <th class="py-3 px-2">GF</th>
                            <th class="py-3 px-2">GA</th>
                            <th class="py-3 px-2">GD</th>
                            <th class="py-3 px-2 text-[#db002d]">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="standings-table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const TEAMS_LIST = [
            { id: "BAR", name: "Barcelona", logo: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg", tg: "https://t.me/Sirkokaung" },
            { id: "RMA", name: "Real Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", tg: "https://t.me/AalDDin12" },
            { id: "ATM", name: "Atletico Madrid", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f9/Atletico_Madrid_Logo_2024.svg/250px-Atletico_Madrid_Logo_2024.svg.png", tg: "https://t.me/kmyatnyein" },
            { id: "VIL", name: "Villarreal", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/b/b9/Villarreal_CF_logo-en.svg/1280px-Villarreal_CF_logo-en.svg.png", tg: "https://t.me/HeinLe3" },
            { id: "RSO", name: "Real Sociedad", logo: "https://upload.wikimedia.org/wikipedia/en/f/f1/Real_Sociedad_logo.svg", tg: "https://t.me/Aung_Htet_Paing23" },
            { id: "BET", name: "Real Betis", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/1/13/Real_betis_logo.svg/1280px-Real_betis_logo.svg.png", tg: "https://t.me/Almoehtwe" },
            { id: "SEV", name: "Sevilla", logo: "https://upload.wikimedia.org/wikipedia/en/3/3b/Sevilla_FC_logo.svg", tg: "https://t.me/UKyawMaung13" },
            { id: "ATH", name: "Athletic Bilbao", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/9/98/Club_Athletic_Bilbao_logo.svg/1280px-Club_Athletic_Bilbao_logo.svg.png", tg: "https://t.me/Alcohol0987" },
            { id: "GET", name: "Getafe", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/46/Getafe_logo.svg/1280px-Getafe_logo.svg.png", tg: "https://t.me/GannaBoy" },
            { id: "GIR", name: "Girona", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f7/Girona_FC_Logo.svg/1280px-Girona_FC_Logo.svg.png", tg: "https://t.me/Dean2172" },
            { id: "VAL", name: "Valencia", logo: "https://upload.wikimedia.org/wikipedia/en/c/ce/Valenciacf.svg", tg: "https://t.me/" },
            { id: "ALA", name: "Alaves", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f8/Deportivo_Alaves_logo_%282020%29.svg/1280px-Deportivo_Alaves_logo_%282020%29.svg.png", tg: "https://t.me/Warhit45" }
        ];

        let fixtures = [], stats = {}, currentViewingMatchday = 0, TOTAL_ROUNDS = 11;
        
        window.onload = function() { 
            generateFixedRoundRobinFixtures(); 
            injectResults();
            calculateStats();
            renderMatchdaySelector(); 
            renderFixtures(); 
        };

        function switchTab(tab) {
            document.getElementById('tab-fixtures-content').classList.toggle('hidden', tab !== 'fixtures');
            document.getElementById('tab-standings-content').classList.toggle('hidden', tab !== 'standings');
            if(tab === 'standings') updateStandingsTable();
        }

        function generateFixedRoundRobinFixtures() {
            const numTeams = TEAMS_LIST.length;
            for (let round = 0; round < numTeams - 1; round++) {
                const roundMatches = [];
                for (let i = 0; i < numTeams / 2; i++) {
                    const home = (round + i) % (numTeams - 1), away = (i === 0) ? numTeams - 1 : (numTeams - 1 - i + round) % (numTeams - 1);
                    roundMatches.push({ home: TEAMS_LIST[home].id, away: TEAMS_LIST[away].id });
                }
                fixtures.push(roundMatches);
            }
        }

        function injectResults() {
            applyResults(0, [{ h: "BAR", a: "ALA", s: "6-2" }, { h: "RMA", a: "VAL", s: "4-1" }, { h: "ATM", a: "GIR", s: "3-4" }, { h: "VIL", a: "GET", s: "2-1" }, { h: "RSO", a: "ATH", s: "1-6" }, { h: "BET", a: "SEV", s: "1-7" }]);
            applyResults(1, [{ h: "RMA", a: "ALA", s: "5-1" }, { h: "ATM", a: "BAR", s: "8-2" }, { h: "VIL", a: "VAL", s: "7-0" }, { h: "RSO", a: "GIR", s: "4-8" }, { h: "BET", a: "GET", s: "2-8" }, { h: "SEV", a: "ATH", s: "2-5" }]);
            applyResults(2, [{ h: "ATM", a: "ALA", s: "1-0" }, { h: "VIL", a: "RMA", s: "4-4" }, { h: "RSO", a: "BAR", s: "5-3" }, { h: "BET", a: "VAL", s: "CANCELLED" }, { h: "SEV", a: "GIR", s: "3-4" }, { h: "ATH", a: "GET", s: "9-1" }]);
            applyResults(3, [{ h: "VIL", a: "ALA", s: "6-2" }, { h: "RSO", a: "ATM", s: "0-3" }, { h: "BET", a: "RMA", s: "0-4" }, { h: "SEV", a: "BAR", s: "4-2" }, { h: "ATH", a: "VAL", s: "4-2" }, { h: "GET", a: "GIR", s: "1-5" }]);
            applyResults(4, [{ h: "RSO", a: "ALA", s: "4-0" }, { h: "BET", a: "VIL", s: "0-4" }, { h: "SEV", a: "ATM", s: "2-5" }, { h: "ATH", a: "RMA", s: "2-7" }, { h: "GET", a: "BAR", s: "6-1" }, { h: "GIR", a: "VAL", s: "8-0" }]);
            applyResults(5, [{ h: "BET", a: "ALA", s: "0-1" }, { h: "SEV", a: "RSO", s: "5-4" }, { h: "ATH", a: "VIL", s: "1-1" }, { h: "GET", a: "ATM", s: "0-2" }, { h: "GIR", a: "RMA", s: "2-1" }, { h: "VAL", a: "BAR", s: "0-3" }]);
            applyResults(6, [{ h: "SEV", a: "ALA", s: "2-1" }, { h: "ATH", a: "BET", s: "3-0" }, { h: "GET", a: "RSO", s: "1-5" }, { h: "GIR", a: "VIL", s: "4-0" }, { h: "VAL", a: "ATM", s: "0-3" }, { h: "BAR", a: "RMA", s: "4-3" }]);
            applyResults(7, [{ h: "ATH", a: "ALA", s: "3-0" }, { h: "GET", a: "SEV", s: "5-6" }, { h: "GIR", a: "BET", s: "9-1" }, { h: "VAL", a: "RSO", s: "0-4" }, { h: "BAR", a: "VIL", s: "0-3" }, { h: "RMA", a: "ATM", s: "1-1" }]);
            
            // Round 9 Results (Index 8)
            applyResults(8, [
                { h: "GET", a: "ALA", s: "5-3" },
                { h: "GIR", a: "ATH", s: "4-7" },
                { h: "VAL", a: "SEV", s: "0-3" },
                { h: "BAR", a: "BET", s: "3-2" },
                { h: "RMA", a: "RSO", s: "3-2" },
                { h: "ATM", a: "VIL", s: "2-3" }
            ]);
        }

        function applyResults(roundIdx, results) {
            if(!fixtures[roundIdx]) return;
            results.forEach(res => {
                const match = fixtures[roundIdx].find(m => (m.home === res.h && m.away === res.a) || (m.home === res.a && m.away === res.h));
                if (match) match.score = res.s;
            });
        }

        function calculateStats() {
            TEAMS_LIST.forEach(t => stats[t.id] = { m:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 });
            fixtures.forEach(round => {
                round.forEach(m => {
                    if(!m.score || m.score === 'CANCELLED') return;
                    const [gs, ga] = m.score.split('-').map(Number);
                    const h = stats[m.home], a = stats[m.away];
                    h.m++; a.m++; h.gf += gs; h.ga += ga; a.gf += ga; a.ga += gs;
                    if(gs > ga) { h.w++; h.pts += 3; a.l++; }
                    else if(gs < ga) { a.w++; a.pts += 3; h.l++; }
                    else { h.d++; a.d++; h.pts++; a.pts++; }
                });
            });
        }

        function renderMatchdaySelector() {
            const container = document.getElementById('matchday-selector-container');
            container.innerHTML = '';
            for (let r = 0; r < TOTAL_ROUNDS; r++) {
                const btn = document.createElement('button');
                btn.id = `matchday-btn-${r}`;
                btn.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${r === 0 ? 'bg-[#db002d] text-white' : 'bg-slate-100 text-slate-600'}`;
                btn.innerText = `R${r + 1}`;
                btn.onclick = () => { currentViewingMatchday = r; renderFixtures(); updateMatchdaySelector(); };
                container.appendChild(btn);
            }
        }

        function updateMatchdaySelector() {
            for (let r = 0; r < TOTAL_ROUNDS; r++) {
                const btn = document.getElementById(`matchday-btn-${r}`);
                btn.className = `flex-shrink-0 px-3 py-1 rounded-lg font-bold text-[10px] border ${r === currentViewingMatchday ? 'bg-[#db002d] text-white' : 'bg-slate-100 text-slate-600'}`;
            }
        }

        function renderFixtures() {
            const container = document.getElementById('fixtures-grid');
            container.innerHTML = '';
            document.getElementById('fixture-round-title').innerText = `ROUND ${currentViewingMatchday + 1}`;
            if (fixtures[currentViewingMatchday]) {
                fixtures[currentViewingMatchday].forEach(match => {
                    const h = TEAMS_LIST.find(t => t.id === match.home), a = TEAMS_LIST.find(t => t.id === match.away);
                    const card = document.createElement('div');
                    card.className = "bg-white border border-slate-100 rounded-xl p-3 grid grid-cols-[1fr,auto,1fr] items-center gap-2 shadow-sm";
                    card.innerHTML = `
                        <a href="${h.tg}" target="_blank" class="flex items-center gap-2"><img src="${h.logo}" class="w-8 h-8 object-contain"><span class="text-xs font-bold truncate">${h.name}</span></a>
                        <div class="flex flex-col items-center px-3">${match.score ? `<span class="text-[${match.score === 'CANCELLED' ? '10px' : '14px'}] font-black text-slate-800">${match.score === 'CANCELLED' ? 'CANCELLED' : match.score}</span>` : `<span class="text-[#db002d] font-black text-sm">VS</span>`}</div>
                        <a href="${a.tg}" target="_blank" class="flex items-center justify-end gap-2 text-right"><span class="text-xs font-bold truncate">${a.name}</span><img src="${a.logo}" class="w-8 h-8 object-contain"></a>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p class="text-center text-xs p-4 text-slate-400">No fixtures for this round yet.</p>';
            }
        }

        function updateStandingsTable() {
            const tbody = document.getElementById('standings-table-body');
            const sorted = TEAMS_LIST.map(t => ({...t, ...stats[t.id]})).sort((a,b) => b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga));
            tbody.innerHTML = sorted.map((t, idx) => `
                <tr>
                    <td class="py-3 px-2 font-bold">${idx+1}</td>
                    <td class="text-left py-3 flex items-center gap-2"><img src="${t.logo}" class="w-5 h-5"><span class="truncate">${t.name}</span></td>
                    <td class="py-3 px-2">${t.m}</td><td class="py-3 px-2">${t.w}</td><td class="py-3 px-2">${t.d}</td><td class="py-3 px-2">${t.l}</td>
                    <td class="py-3 px-2">${t.gf}</td><td class="py-3 px-2">${t.ga}</td><td class="py-3 px-2">${t.gf - t.ga}</td>
                    <td class="py-3 px-2 font-bold text-[#db002d]">${t.pts}</td>
                </tr>
            `).join('');
        }
        
        function changeMatchday(d) {
            let n = currentViewingMatchday + d;
            if (n >= 0 && n < TOTAL_ROUNDS) { currentViewingMatchday = n; renderFixtures(); updateMatchdaySelector(); }
        }
    </script>
</body>
</html>
